name: Newsletter digest

# Sundays at 09:00 UTC — that's 1pm Sharjah (UTC+4), morning Western Europe,
# early-morning North America. The endpoint is idempotent — re-runs within
# 6 days of a subscriber's last email skip them, so manual triggers via
# workflow_dispatch are safe.

on:
  schedule:
    - cron: '0 9 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: POST /api/newsletter/digest
        env:
          DIGEST_AUTH_TOKEN: ${{ secrets.DIGEST_AUTH_TOKEN }}
        run: |
          if [[ -z "$DIGEST_AUTH_TOKEN" ]]; then
            echo "DIGEST_AUTH_TOKEN repo secret is not set — skipping."
            exit 0
          fi
          response=$(curl -sS -o /tmp/body -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $DIGEST_AUTH_TOKEN" \
            https://husayngokal.com/api/newsletter/digest)
          echo "status: $response"
          cat /tmp/body
          if [ "$response" -ge 500 ]; then exit 1; fi

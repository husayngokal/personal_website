<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 220 282"
  width="220"
  height="282"
  role="img"
  aria-label="Husayn Gokal — portrait (placeholder)"
>
  <!--
    Placeholder portrait silhouette in the site's hand-line language.
    Replaces the dashed text-box placeholder so the hero composition reads
    correctly even before /public/hero.png is dropped in. When the real
    photo exists at /public/hero.png, the HeroPortrait component prefers it.

    Line language per BRIEF.md Part II: 1.6px stroke #111, warm-beige fill,
    deliberately slightly asymmetric, no shading or gradients.
  -->
  <defs>
    <clipPath id="frame">
      <rect x="0" y="0" width="220" height="282" />
    </clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <!-- Suit lapel left -->
    <path d="M30 282 L48 220 L92 200 L110 220 L110 282 Z"
          fill="#C9A87C" stroke="#111111" stroke-width="1.6" stroke-linejoin="round" />
    <!-- Suit lapel right -->
    <path d="M190 282 L172 220 L128 200 L110 220 L110 282 Z"
          fill="#B89868" stroke="#111111" stroke-width="1.6" stroke-linejoin="round" />
    <!-- Shirt collar — cream -->
    <path d="M92 200 L110 215 L128 200 L128 282 L92 282 Z"
          fill="#F0E6D0" stroke="#111111" stroke-width="1.4" stroke-linejoin="round" />
    <!-- Neck -->
    <path d="M96 200 L96 174 Q110 178 124 174 L124 200 Z"
          fill="#E8C29C" stroke="#111111" stroke-width="1.6" stroke-linejoin="round" />
    <!-- Head — warm skin -->
    <ellipse cx="110" cy="130" rx="46" ry="56"
             fill="#E8C29C" stroke="#111111" stroke-width="1.8" />
    <!-- Hair top -->
    <path d="M66 116 Q72 70 110 64 Q150 70 154 116 Q150 90 110 88 Q72 90 66 116 Z"
          fill="#2A211B" stroke="#111111" stroke-width="1.6" stroke-linejoin="round" />
    <!-- Glasses frames -->
    <ellipse cx="92" cy="132" rx="14" ry="12"
             fill="none" stroke="#111111" stroke-width="1.6" />
    <ellipse cx="128" cy="132" rx="14" ry="12"
             fill="none" stroke="#111111" stroke-width="1.6" />
    <path d="M106 132 L114 132"
          stroke="#111111" stroke-width="1.6" stroke-linecap="round" />
    <!-- Beard outline -->
    <path d="M82 156 Q92 188 110 192 Q128 188 138 156"
          fill="none" stroke="#111111" stroke-width="1.4" stroke-linecap="round" />
    <!-- Mouth -->
    <path d="M100 168 Q110 173 120 168"
          fill="none" stroke="#111111" stroke-width="1.4" stroke-linecap="round" />
    <!-- Tiny "placeholder" tag in mono — readable to the author, invisible from a distance -->
    <text x="110" y="278"
          text-anchor="middle"
          font-family="ui-monospace, SFMono-Regular, monospace"
          font-size="7"
          letter-spacing="0.14em"
          fill="#888888">
      PLACEHOLDER
    </text>
  </g>
</svg>
